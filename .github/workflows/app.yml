name: 'App HMDCC Producão'
on:
  pull_request:
    branches: ["main"]
    types:
      - closed
    paths:
      - './**'
      - '.github/workflows/app.yml'
    workflow_dispatch:

jobs:
  PRODUCAO:
    name: Deploy de producao
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Sincronizando arquivos
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: app.hmdcc.com.br
        username: ${{ secrets.MINASONLINE_FTP_USERNAME }}
        password: ${{ secrets.MINASONLINE_FTP_PASSWORD }}
        server-dir: public_html/app.hmdcc.com.br/stage/
        exclude: |
          **/.git*
          **/.git*/**
          soft-ui-dashboard-main/**
          fileToExclude.txt
          readme.rst
          license.txt
          contributing.md
          composer.json

